; --------------------------------------------------
; Security
; --------------------------------------------------

expose_php = Off
display_errors = Off
log_errors = On

; --------------------------------------------------
; Resource limits
; --------------------------------------------------

max_execution_time = 30
memory_limit = 128M

; --------------------------------------------------
; File uploads (safe defaults)
; --------------------------------------------------

file_uploads = On
upload_max_filesize = 10M
post_max_size = 10M

; --------------------------------------------------
; Session security
; --------------------------------------------------

session.cookie_httponly = 1
session.use_strict_mode = 1
session.cookie_secure = 1
